<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Мониторинг задач</title>
  <style>
    :root {
      --border: #d9dde3;
      --muted: #6b7280;
      --bg-head: #f4f6f8;
      --bg-pending: #eef6ff;
      --bg-progress: #fff7e6;
      --bg-paused: #f8f1ff;
      --bg-page: #fafbfc;
    }

    body {
      margin: 24px;
      background: var(--bg-page);
      color: #1f2937;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 20px;
    }

    .page-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .page-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .summary {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .summary-card {
      min-width: 180px;
      padding: 12px 14px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .summary-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .summary-value {
      font-size: 20px;
      font-weight: 600;
    }

    .table-wrap {
      overflow-x: auto;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: var(--bg-head);
      font-weight: 600;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr.status-pending {
      background: var(--bg-pending);
    }

    tr.status-in_progress {
      background: var(--bg-progress);
    }

    tr.status-paused {
      background: var(--bg-paused);
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .muted {
      color: var(--muted);
    }

    .status-badge {
      display: inline-block;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      font-size: 12px;
      white-space: nowrap;
    }

    .empty-state {
      padding: 20px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body data-pool-id="{{ pool_id }}">
  <div class="page-header">
    <div>
      <h1 class="page-title">Live-задачи</h1>
      <p class="page-subtitle">
        Активные задачи из текущего пула с обновлением через WebSocket
      </p>
    </div>
  </div>

  <div class="summary">
    <div class="summary-card">
      <span class="summary-label">Пул задач</span>
      <span class="summary-value" id="poolLabel">{{ pool_id|default:"—" }}</span>
    </div>
    <div class="summary-card">
      <span class="summary-label">Задач на экране</span>
      <span class="summary-value" id="taskCount">0</span>
    </div>
  </div>

  <div class="table-wrap">
    <table id="taskTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Название</th>
          <th>Описание</th>
          <th>Статус</th>
          <th>Приоритет</th>
          <th>Смена</th>
          <th>Сотрудник</th>
          <th>Груз</th>
          <th>Источник</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div id="emptyState" class="empty-state" hidden>Нет активных задач для отображения.</div>
  </div>

  <script>
    const tbody = document.querySelector("#taskTable tbody");
    const poolId = (document.body.dataset.poolId || "").trim();
    const taskCountEl = document.getElementById("taskCount");
    const emptyStateEl = document.getElementById("emptyState");

    const API_BASE = poolId
      ? `/api/task-pools/${poolId}/tasks/`
      : "/api/tasks/";

    const VISIBLE_STATUSES = new Set(["pending", "in_progress", "paused"]);
    const FINAL_STATUSES = new Set(["completed", "cancelled", "failed"]);

    function updateSummary() {
      const count = tbody.querySelectorAll("tr[data-task-id]").length;
      taskCountEl.textContent = String(count);
      emptyStateEl.hidden = count > 0;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatEmployee(emp) {
      if (!emp) return "—";
      const code = emp.employee_code || "";
      const firstName = emp.first_name || "";
      const lastName = emp.last_name || "";
      const fullName = `${firstName} ${lastName}`.trim();

      if (code && fullName) return `${code} — ${fullName}`;
      if (code) return code;
      if (fullName) return fullName;
      return "—";
    }

    function formatShift(shift) {
      if (shift == null || shift === "") return "—";
      return `#${shift}`;
    }

    function formatCargo(cargo) {
      if (!cargo) return "—";
      return cargo.cargo_code || "—";
    }

    function getRow(taskId) {
      return tbody.querySelector(`tr[data-task-id="${taskId}"]`);
    }

    function removeRow(taskId) {
      const row = getRow(taskId);
      if (row) {
        row.remove();
        updateSummary();
      }
    }

    function upsertRow(task) {
      const taskId = task?.id;
      if (taskId == null) return;

      const status = task.status || "";
      if (FINAL_STATUSES.has(status)) {
        removeRow(String(taskId));
        return;
      }

      if (!VISIBLE_STATUSES.has(status)) {
        return;
      }

      let row = getRow(String(taskId));
      if (!row) {
        row = document.createElement("tr");
        row.dataset.taskId = String(taskId);
        tbody.prepend(row);
      }

      row.className = "";
      row.classList.add(`status-${status}`);

      row.innerHTML = `
        <td class="mono">${escapeHtml(taskId)}</td>
        <td>${escapeHtml(task.name || "—")}</td>
        <td>${escapeHtml(task.description || "—")}</td>
        <td><span class="status-badge">${escapeHtml(status)}</span></td>
        <td>${escapeHtml(task.priority ?? "—")}</td>
        <td>${escapeHtml(formatShift(task.shift))}</td>
        <td>${escapeHtml(formatEmployee(task.assigned_to))}</td>
        <td>${escapeHtml(formatCargo(task.cargo))}</td>
        <td>${escapeHtml(task.source || "—")}</td>
      `;

      updateSummary();
    }

    async function loadInitialTasks() {
      try {
        const response = await fetch(API_BASE);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const payload = await response.json();
        const tasks = Array.isArray(payload) ? payload : (payload.results || []);
        tasks.forEach(upsertRow);
        updateSummary();
      } catch (error) {
        console.error("Ошибка начальной загрузки задач:", error);
      }
    }

    function connectWS() {
      const scheme = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${scheme}://${location.host}/ws/tasks/`);

      ws.onopen = () => console.log("WS connected");
      ws.onerror = (event) => console.error("WS error:", event);
      ws.onclose = () => {
        console.warn("WS closed, retry in 2s");
        setTimeout(connectWS, 2000);
      };

      ws.onmessage = (event) => {
        let data;
        try {
          data = JSON.parse(event.data);
        } catch {
          return;
        }

        if (data?.reason === "смена завершена") {
          tbody.innerHTML = "";
          updateSummary();
          return;
        }

        if (data?.id == null) {
          return;
        }

        upsertRow(data);
      };
    }

    loadInitialTasks();
    connectWS();
  </script>
</body>
</html>
